<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="stylesheet.css" />
    <link
      rel="stylesheet"
      media="screen"
      href="https://fontlibrary.org//face/unique"
      type="text/css"
    />
  </head>
  <body>
    <div class="container">
      <div class="background-image-container">
        <div class="banner">
          <div class="brand-logo">
            <img src="img/zap.svg" alt="lightning logo" />
          </div>
          <div class="brand-name">FAST</div>
        </div>
        <div class="picture-credit">
          Photo by
          <a href="https://unsplash.com/@shotfromdeep">Deep Doshi</a>
          on
          <a
            href="https://unsplash.com/photos/auto-rickshaw-speeding-through-a-blurred-cityscape--aAA5jQuaJ4"
            >Unsplash</a
          >
        </div>
      </div>
      <div class="form-container">
        <div class="about">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams. Sign up
            <em>fast</em> to get started.
          </p>
          <p>You <em>know</em> you want to.</p>
        </div>
        <div class="form">
          <form action="" method="get">
            <section class="main-input">
              <p>Let's do this!</p>
              <p>
                <label for="first_name">FIRST NAME</label>
                <input type="text" name="first_name" id="first_name" />
              </p>
              <p>
                <label for="last_name">LAST NAME</label>
                <input type="text" name="last_name" id="last_name" />
              </p>
              <p>
                <label for="email">EMAIL</label>
                <input type="email" name="email" id="email" />
              </p>
              <p>
                <label for="number">PHONE NUMBER</label>
                <input type="tel" name="number" id="number" />
              </p>
              <p>
                <label for="password">PASSWORD</label>
                <input type="password" name="password" id="password" />
              </p>
              <p>
                <label for="conf_password">CONFIRM PASSWORD</label>
                <input
                  type="password"
                  name="conf_password"
                  id="conf_password"
                />
              </p>
            </section>
            <section class="button"></section>
          </form>
        </div>
        <div class="login">Already have an account? <a href="">Log in</a></div>
      </div>
    </div>
  </body>
</html>
